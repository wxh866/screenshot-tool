name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    # 本项目依赖 Windows 专属 API（pywin32 / Win32 热键），需在 Windows 运行
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile check
        run: |
          python -m compileall -q controllers core engines models platforms themes utils main.py

      - name: Run tests
        run: |
          python run_tests.py
